<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lithium Browser</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ═══════════════════════════════════════════
   THEMES
═══════════════════════════════════════════ */
:root {
  --body-bg:       linear-gradient(180deg,#c8ddf0 0%,#a8c8e8 40%,#88b0d8 100%);
  --tabbar-bg:     linear-gradient(180deg,rgba(200,220,245,.7) 0%,rgba(160,195,235,.65) 100%);
  --toolbar-bg:    linear-gradient(180deg,rgba(215,232,250,.88) 0%,rgba(170,200,238,.82) 50%,rgba(145,185,228,.85) 100%);
  --bookbar-bg:    linear-gradient(180deg,rgba(200,222,245,.82) 0%,rgba(170,200,235,.78) 100%);
  --statusbar-bg:  linear-gradient(180deg,rgba(190,215,242,.88) 0%,rgba(160,195,230,.9) 100%);
  --tab-inactive:  rgba(160,190,225,.55);
  --tab-active:    rgba(225,238,252,.92);
  --chrome-border: rgba(100,150,200,.6);
  --btn-bg:        linear-gradient(180deg,rgba(255,255,255,.75) 0%,rgba(185,215,245,.65) 50%,rgba(145,190,230,.7) 100%);
  --btn-border:    rgba(100,155,210,.55);
  --urlbar-bg:     rgba(255,255,255,.88);
  --urlbar-border: rgba(100,155,210,.55);
  --ctx-bg:        linear-gradient(180deg,rgba(235,245,255,.97) 0%,rgba(215,232,250,.97) 100%);
  --ntp-bg:        linear-gradient(160deg,#d8ecff 0%,#c2daf8 40%,#b0ccf0 100%);
  --card-bg:       linear-gradient(180deg,rgba(255,255,255,.82) 0%,rgba(210,228,250,.75) 100%);
  --card-border:   rgba(140,185,230,.6);
  --accent:        #4a90d9;
  --text:          #1a2a3a;
  --text-light:    #3a5a7a;
  --muted:         #6a8aaa;
  --danger:        #c0392b;
  --success:       #27ae60;
  --progress-bar:  linear-gradient(90deg,#3a80d0,#7ab8f5);
  --tab-h: 34px; --bar-h: 48px; --status-h: 22px;
}

/* Dark theme */
[data-theme="dark"] {
  --body-bg:       linear-gradient(180deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  --tabbar-bg:     linear-gradient(180deg,rgba(30,40,60,.9) 0%,rgba(20,30,50,.85) 100%);
  --toolbar-bg:    linear-gradient(180deg,rgba(30,45,70,.9) 0%,rgba(20,35,58,.92) 100%);
  --bookbar-bg:    linear-gradient(180deg,rgba(25,38,60,.88) 0%,rgba(18,30,50,.9) 100%);
  --statusbar-bg:  linear-gradient(180deg,rgba(18,28,48,.9) 0%,rgba(14,22,40,.95) 100%);
  --tab-inactive:  rgba(40,60,100,.6);
  --tab-active:    rgba(50,80,130,.85);
  --chrome-border: rgba(60,100,160,.5);
  --btn-bg:        linear-gradient(180deg,rgba(60,90,140,.6) 0%,rgba(40,65,110,.8) 100%);
  --btn-border:    rgba(80,130,200,.5);
  --urlbar-bg:     rgba(20,35,60,.9);
  --urlbar-border: rgba(70,120,190,.5);
  --ctx-bg:        linear-gradient(180deg,rgba(30,45,75,.97) 0%,rgba(22,35,60,.97) 100%);
  --ntp-bg:        linear-gradient(160deg,#0d1b35 0%,#0a1628 50%,#071020 100%);
  --card-bg:       linear-gradient(180deg,rgba(40,60,100,.85) 0%,rgba(25,40,70,.9) 100%);
  --card-border:   rgba(70,120,190,.5);
  --accent:        #5ba3f0;
  --text:          #d0e4f8;
  --text-light:    #90b8de;
  --muted:         #5a7a9a;
  --progress-bar:  linear-gradient(90deg,#5ba3f0,#90c8ff);
}

/* Forest Green theme */
[data-theme="green"] {
  --body-bg:       linear-gradient(180deg,#c8e8d0 0%,#a0c8b0 40%,#78a890 100%);
  --tabbar-bg:     linear-gradient(180deg,rgba(180,220,190,.7) 0%,rgba(140,195,160,.65) 100%);
  --toolbar-bg:    linear-gradient(180deg,rgba(200,238,210,.88) 0%,rgba(155,200,170,.82) 50%,rgba(130,178,150,.85) 100%);
  --bookbar-bg:    linear-gradient(180deg,rgba(185,225,200,.82) 0%,rgba(155,200,170,.78) 100%);
  --statusbar-bg:  linear-gradient(180deg,rgba(175,215,190,.88) 0%,rgba(145,190,162,.9) 100%);
  --tab-inactive:  rgba(140,190,155,.55);
  --tab-active:    rgba(215,245,225,.92);
  --chrome-border: rgba(80,155,100,.6);
  --btn-bg:        linear-gradient(180deg,rgba(255,255,255,.75) 0%,rgba(175,225,190,.65) 50%,rgba(130,190,150,.7) 100%);
  --btn-border:    rgba(90,160,115,.55);
  --urlbar-bg:     rgba(250,255,252,.9);
  --urlbar-border: rgba(90,160,115,.55);
  --ctx-bg:        linear-gradient(180deg,rgba(225,248,232,.97) 0%,rgba(200,235,215,.97) 100%);
  --ntp-bg:        linear-gradient(160deg,#d0f0da 0%,#b8e0c8 40%,#a0d0b5 100%);
  --card-bg:       linear-gradient(180deg,rgba(255,255,255,.82) 0%,rgba(205,240,220,.75) 100%);
  --card-border:   rgba(120,190,145,.6);
  --accent:        #3a9a5a;
  --text:          #0a2a14;
  --text-light:    #2a5a3a;
  --muted:         #5a8a6a;
  --progress-bar:  linear-gradient(90deg,#3a9a5a,#6acc8a);
}

/* Sunset/Warm theme */
[data-theme="sunset"] {
  --body-bg:       linear-gradient(180deg,#f5d0a8 0%,#e8a870 40%,#d07848 100%);
  --tabbar-bg:     linear-gradient(180deg,rgba(245,210,160,.7) 0%,rgba(220,175,120,.65) 100%);
  --toolbar-bg:    linear-gradient(180deg,rgba(252,225,175,.88) 0%,rgba(230,188,130,.82) 50%,rgba(210,165,108,.85) 100%);
  --bookbar-bg:    linear-gradient(180deg,rgba(248,215,168,.82) 0%,rgba(225,182,128,.78) 100%);
  --statusbar-bg:  linear-gradient(180deg,rgba(240,205,158,.88) 0%,rgba(215,175,122,.9) 100%);
  --tab-inactive:  rgba(210,170,120,.55);
  --tab-active:    rgba(255,240,215,.92);
  --chrome-border: rgba(185,130,80,.6);
  --btn-bg:        linear-gradient(180deg,rgba(255,255,255,.75) 0%,rgba(248,220,170,.65) 50%,rgba(225,185,128,.7) 100%);
  --btn-border:    rgba(190,140,90,.55);
  --urlbar-bg:     rgba(255,252,245,.9);
  --urlbar-border: rgba(190,140,90,.55);
  --ctx-bg:        linear-gradient(180deg,rgba(255,245,225,.97) 0%,rgba(245,225,190,.97) 100%);
  --ntp-bg:        linear-gradient(160deg,#fde8c0 0%,#f5d090 40%,#e8b870 100%);
  --card-bg:       linear-gradient(180deg,rgba(255,252,245,.85) 0%,rgba(250,230,195,.78) 100%);
  --card-border:   rgba(200,155,100,.6);
  --accent:        #c0612a;
  --text:          #2a1008;
  --text-light:    #5a2a10;
  --muted:         #8a5a38;
  --progress-bar:  linear-gradient(90deg,#c0612a,#e8902a);
}

html,body{width:100%;height:100%}
body{
  font-family:'Segoe UI',Tahoma,sans-serif;
  background:var(--body-bg);
  color:var(--text);
  display:flex;flex-direction:column;
  overflow:hidden;user-select:none;font-size:12px;
}

/* ── TAB BAR ── */
#tab-bar{
  display:flex;align-items:flex-end;flex-shrink:0;
  background:var(--tabbar-bg);
  padding:5px 8px 0;gap:2px;
  height:calc(var(--tab-h)+5px);
  border-bottom:1px solid var(--chrome-border);
  overflow-x:auto;overflow-y:hidden;
}
#tab-bar::-webkit-scrollbar{height:0}

@keyframes tabIn{from{opacity:0;max-width:0;padding:0}to{opacity:1;max-width:200px}}
@keyframes tabOut{from{opacity:1;max-width:200px;padding:0 10px}to{opacity:0;max-width:0;padding:0;min-width:0}}

.tab{
  display:flex;align-items:center;gap:6px;
  height:var(--tab-h);padding:0 10px;
  background:var(--tab-inactive);
  border:1px solid var(--chrome-border);
  border-bottom:none;border-radius:6px 6px 0 0;
  cursor:pointer;min-width:120px;max-width:200px;
  flex-shrink:0;position:relative;overflow:hidden;
  transform-origin:left bottom;animation:tabIn .18s ease-out;
}
.tab::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.5) 0%,rgba(255,255,255,.1) 100%);
  pointer-events:none;border-radius:6px 6px 0 0}
.tab:hover{background:rgba(195,218,245,.7)}
.tab.active{background:var(--tab-active);border-color:rgba(100,155,210,.7);
  border-bottom:1px solid var(--tab-active);margin-bottom:-1px;z-index:1}
.tab.active::before{background:linear-gradient(180deg,rgba(255,255,255,.85) 0%,rgba(255,255,255,.2) 100%)}
.tab.closing{animation:tabOut .15s ease-in forwards;pointer-events:none;min-width:0}
.tab-favicon{font-size:11px;flex-shrink:0}
.tab-title{font-size:11px;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tab.active .tab-title{color:var(--text);font-weight:600}
.tab-close{width:15px;height:15px;border-radius:3px;background:transparent;border:none;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;transition:background .1s,color .1s}
.tab-close:hover{background:rgba(200,50,50,.75);color:white}

#new-tab-btn{height:var(--tab-h);width:28px;background:rgba(180,210,240,.4);
  border:1px solid var(--chrome-border);border-radius:5px;
  color:var(--muted);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  align-self:center;flex-shrink:0;transition:background .1s}
#new-tab-btn:hover{background:rgba(200,225,250,.7);color:var(--accent)}

/* ── TOOLBAR ── */
#toolbar{display:flex;align-items:center;flex-shrink:0;gap:6px;padding:6px 10px;
  background:var(--toolbar-bg);border-bottom:1px solid var(--chrome-border);
  height:var(--bar-h);box-shadow:0 1px 4px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.7)}

.nav-btn{width:28px;height:28px;background:var(--btn-bg);border:1px solid var(--btn-border);
  border-radius:4px;color:var(--text-light);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.8);
  position:relative;overflow:hidden;transition:background .1s}
.nav-btn:hover{filter:brightness(1.1);color:var(--text);border-color:var(--accent)}
.nav-btn:active{filter:brightness(.95);box-shadow:inset 0 1px 3px rgba(0,50,150,.2)}
.nav-btn:disabled{opacity:.35;cursor:default;pointer-events:none}

#url-wrap{flex:1;position:relative;display:flex;align-items:center}
#secure-icon{position:absolute;left:8px;font-size:11px;z-index:2;pointer-events:none;color:var(--muted)}
#url-bar{
  width:100%;height:26px;background:var(--urlbar-bg);
  border:1px solid var(--urlbar-border);border-radius:3px;
  color:var(--text);font-family:'Segoe UI',Tahoma,sans-serif;font-size:12px;
  padding:0 52px 0 26px;outline:none;
  box-shadow:inset 0 1px 3px rgba(0,50,150,.12);
  transition:box-shadow .15s,border-color .15s
}
#url-bar::placeholder{color:var(--muted)}
#url-bar:focus{border-color:rgba(60,120,200,.8);background:var(--urlbar-bg);
  box-shadow:inset 0 1px 3px rgba(0,50,150,.15),0 0 0 2px rgba(74,144,217,.22)}
@keyframes urlPulse{
  0%{box-shadow:inset 0 1px 3px rgba(0,50,150,.15),0 0 0 3px rgba(74,144,217,.22)}
  50%{box-shadow:inset 0 1px 3px rgba(0,50,150,.15),0 0 0 5px rgba(74,144,217,.38)}
  100%{box-shadow:inset 0 1px 3px rgba(0,50,150,.15),0 0 0 3px rgba(74,144,217,.22)}
}
#url-bar.searching{animation:urlPulse .4s ease-in-out;border-color:rgba(60,120,200,.9)}

/* URL dropdown for history suggestions */
#url-dropdown{
  position:absolute;top:100%;left:0;right:0;z-index:1000;
  background:var(--ctx-bg);border:1px solid var(--chrome-border);
  border-top:none;border-radius:0 0 4px 4px;
  box-shadow:2px 4px 12px rgba(0,40,120,.2);
  max-height:200px;overflow-y:auto;display:none
}
#url-dropdown.open{display:block}
.url-suggestion{padding:5px 10px 5px 26px;cursor:pointer;font-size:11px;
  color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  border-bottom:1px solid rgba(100,155,210,.12);transition:background .08s}
.url-suggestion:last-child{border-bottom:none}
.url-suggestion:hover,.url-suggestion.sel{background:rgba(74,144,217,.15);color:var(--text)}
.url-suggestion .sug-icon{display:inline-block;width:14px;margin-right:4px;text-align:center}
.url-suggestion .sug-domain{color:var(--muted);font-size:10px;margin-left:4px}

#url-actions{position:absolute;right:4px;display:flex;gap:1px;align-items:center}
#refresh-btn-inline{width:22px;height:22px;background:none;border:none;
  color:var(--muted);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;border-radius:3px;
  transition:color .1s,background .1s}
#refresh-btn-inline:hover{color:var(--accent);background:rgba(74,144,217,.12)}
#refresh-btn-inline.loading{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PROGRESS ── */
#progress-bar{height:3px;flex-shrink:0;background:var(--progress-bar);width:0%;transition:width .25s ease}

/* ── BOOKMARKS BAR ── */
#bookmarks-bar{display:flex;align-items:center;gap:2px;flex-shrink:0;
  padding:2px 8px;background:var(--bookbar-bg);
  border-bottom:1px solid var(--chrome-border);overflow-x:auto;min-height:24px}
#bookmarks-bar::-webkit-scrollbar{height:0}
@keyframes bmIn{from{opacity:0;max-width:0;padding:0}to{opacity:1;max-width:180px}}
.bookmark-item{display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;
  cursor:pointer;font-size:11px;color:var(--text-light);white-space:nowrap;
  border:1px solid transparent;transition:background .1s;animation:bmIn .15s ease-out}
.bookmark-item:hover{background:rgba(255,255,255,.55);border-color:rgba(100,155,210,.4)}
.bm-remove{display:none;margin-left:2px;color:var(--muted);font-size:10px;
  width:13px;height:13px;line-height:13px;text-align:center;border-radius:2px}
.bookmark-item:hover .bm-remove{display:inline-block}
.bm-remove:hover{background:rgba(200,50,50,.7);color:white}

/* ── VIEWPORT ── */
#viewport{flex:1;position:relative;overflow:hidden;background:#fff;min-height:0}
.browser-frame{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:white}
.browser-frame.active{display:block}

/* ── NEW TAB PAGE ── */
.new-tab-page{position:absolute;inset:0;background:var(--ntp-bg);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.new-tab-page.active{display:flex}
.ntp-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;
  padding:28px 32px;display:flex;flex-direction:column;align-items:center;gap:16px;
  box-shadow:0 4px 20px rgba(0,50,150,.12),inset 0 1px 0 rgba(255,255,255,.9);
  min-width:420px;max-width:90vw;position:relative;overflow:hidden}
.ntp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.55) 0%,rgba(255,255,255,.05) 100%);
  pointer-events:none}
.ntp-title{font-weight:300;font-size:34px;color:var(--text);letter-spacing:2px;
  text-shadow:0 1px 2px rgba(255,255,255,.7)}
.ntp-title span{font-weight:700;color:var(--accent)}
.ntp-search-wrap{width:100%;display:flex;border:1px solid var(--urlbar-border);border-radius:3px;
  overflow:hidden;background:var(--urlbar-bg);box-shadow:inset 0 1px 3px rgba(0,50,150,.1)}
.ntp-search-wrap:focus-within{border-color:rgba(60,120,200,.8);
  box-shadow:inset 0 1px 3px rgba(0,50,150,.12),0 0 0 2px rgba(74,144,217,.2)}
.ntp-search-wrap input{flex:1;background:none;border:none;color:var(--text);
  font-family:'Segoe UI',Tahoma,sans-serif;font-size:13px;padding:8px 12px;outline:none}
.ntp-search-wrap input::placeholder{color:var(--muted)}
.ntp-search-wrap button{background:var(--btn-bg);border:none;border-left:1px solid var(--btn-border);
  color:var(--text-light);padding:0 16px;cursor:pointer;
  font-family:'Segoe UI',Tahoma,sans-serif;font-size:12px;font-weight:600;transition:filter .1s}
.ntp-search-wrap button:hover{filter:brightness(1.08);color:var(--accent)}

/* ── LOADING ── */
#loading-overlay{position:absolute;inset:0;background:rgba(200,220,245,.5);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;z-index:10;opacity:0;pointer-events:none;transition:opacity .15s}
#loading-overlay.show{opacity:1;pointer-events:all}
.spinner{width:28px;height:28px;border:2px solid rgba(74,144,217,.25);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.loading-label{font-size:11px;color:var(--muted)}

/* ── BLOCKED PAGE ── */
.blocked-page{position:absolute;inset:0;background:var(--ntp-bg);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:40px;text-align:center}
.blocked-page.active{display:flex}
.blocked-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;
  padding:28px 32px;max-width:440px;width:100%;
  box-shadow:0 4px 20px rgba(0,50,150,.12),inset 0 1px 0 rgba(255,255,255,.9);
  display:flex;flex-direction:column;align-items:center;gap:12px;
  position:relative;overflow:hidden}
.blocked-card::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.5) 0%,rgba(255,255,255,.05) 100%);pointer-events:none}
.blocked-icon{font-size:32px}
.blocked-card h2{font-size:15px;font-weight:600;color:var(--text)}
.blocked-card p{font-size:12px;color:var(--muted);line-height:1.6}
.blocked-card p strong{color:var(--accent)}
.blocked-url{font-size:10px;color:var(--muted);background:rgba(74,144,217,.06);
  border:1px solid var(--card-border);border-radius:3px;padding:4px 10px;max-width:100%;word-break:break-all}
.blocked-actions{display:flex;gap:8px;margin-top:4px}
.glass-btn{padding:6px 18px;background:var(--btn-bg);border:1px solid var(--btn-border);border-radius:4px;
  color:var(--text);cursor:pointer;font-family:'Segoe UI',Tahoma,sans-serif;font-size:12px;font-weight:600;
  box-shadow:0 1px 3px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.8);transition:filter .1s}
.glass-btn:hover{filter:brightness(1.08);border-color:var(--accent)}
.glass-btn.secondary{background:transparent;font-weight:400;color:var(--muted)}

/* ── STATUS BAR ── */
#status-bar{height:var(--status-h);flex-shrink:0;background:var(--statusbar-bg);
  border-top:1px solid var(--chrome-border);display:flex;align-items:center;
  padding:0 10px;gap:8px;font-size:11px;color:var(--muted);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5)}
#status-text{flex:1}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);flex-shrink:0}

/* ── CONTEXT MENU ── */
#ctx-menu{position:fixed;background:var(--ctx-bg);border:1px solid var(--chrome-border);
  border-radius:4px;padding:4px 0;display:none;flex-direction:column;
  z-index:9999;min-width:165px;box-shadow:2px 4px 12px rgba(0,40,120,.2)}
#ctx-menu.show{display:flex}
.ctx-item{padding:6px 14px;cursor:pointer;font-size:12px;color:var(--text);
  display:flex;align-items:center;justify-content:space-between;gap:8px;transition:background .08s}
.ctx-item:hover{background:rgba(74,144,217,.18);color:var(--text)}
.ctx-item .ctx-shortcut{color:var(--muted);font-size:10px}
.ctx-sep{height:1px;background:var(--chrome-border);margin:3px 0;opacity:.4}

/* ── MODAL OVERLAY ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,20,60,.35);z-index:10000;
  display:none;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
.modal{background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;
  min-width:480px;max-width:92vw;max-height:85vh;
  box-shadow:0 8px 32px rgba(0,40,120,.3),inset 0 1px 0 rgba(255,255,255,.8);
  display:flex;flex-direction:column;overflow:hidden;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;
  background:linear-gradient(180deg,rgba(255,255,255,.45) 0%,rgba(255,255,255,.02) 100%);
  pointer-events:none}
.modal-header{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--chrome-border);flex-shrink:0}

/* History modal */

/* Themes modal */
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding-bottom:4px}

.about-badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.badge{padding:3px 10px;border:1px solid var(--chrome-border);border-radius:12px;
  font-size:10px;color:var(--muted);background:rgba(74,144,217,.07)}

/* Scrollbar */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:rgba(180,210,240,.3)}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,rgba(180,210,240,.9),rgba(130,175,220,.9));
  border-radius:4px;border:1px solid rgba(100,155,210,.3)}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,rgba(155,195,235,1),rgba(110,160,215,1))}
</style>
</head>
<body>

<div id="tab-bar"><button id="new-tab-btn" title="New tab (Ctrl+T)">+</button></div>

<div id="toolbar">
  <button class="nav-btn" id="btn-back" title="Back (Alt+←)">‹</button>
  <button class="nav-btn" id="btn-fwd"  title="Forward (Alt+→)">›</button>
  <button class="nav-btn" id="btn-home" title="Home">⌂</button>
  <div id="url-wrap">
    <span id="secure-icon">⊞</span>
    <input id="url-bar" type="text" placeholder="Search or enter web address" spellcheck="false" autocomplete="off">
    <div id="url-dropdown"></div>
    <div id="url-actions">
      <button id="refresh-btn-inline" title="Refresh (F5)">↻</button>
    </div>
  </div>
  <button class="nav-btn" id="btn-bm"   title="Bookmark (Ctrl+D)">☆</button>
  <button class="nav-btn" id="btn-menu" title="Tools">▾</button>
</div>

<div id="progress-bar"></div>
<div id="bookmarks-bar"></div>

<div id="viewport">
  <div id="loading-overlay"><div class="spinner"></div><div class="loading-label">Loading…</div></div>
</div>

<div id="status-bar">
  <div class="status-dot"></div>
  <div id="status-text">Ready</div>
  <div id="status-right">Lithium Browser</div>
</div>

<div id="ctx-menu">
  <div class="ctx-item" id="ctx-new-tab">New Tab <span class="ctx-shortcut">Ctrl+T</span></div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" id="ctx-history">History <span class="ctx-shortcut">Ctrl+H</span></div>
  <div class="ctx-item" id="ctx-themes">Themes</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" id="ctx-zoom-in">Zoom In <span class="ctx-shortcut">Ctrl++</span></div>
  <div class="ctx-item" id="ctx-zoom-out">Zoom Out <span class="ctx-shortcut">Ctrl+−</span></div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" id="ctx-about">About Lithium</div>
</div>

<!-- MODALS -->
<div id="modal-overlay">
  <div class="modal" id="modal-box" style="display:none"></div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════
   AUDIO ENGINE — Web Audio API tones
═══════════════════════════════════════ */
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, type, duration, gainVal, fadeOut) {
  try {
    const g = AC.createGain();
    const o = AC.createOscillator();
    o.type = type; o.frequency.setValueAtTime(freq, AC.currentTime);
    g.gain.setValueAtTime(gainVal, AC.currentTime);
    if (fadeOut) g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + duration);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + duration);
  } catch(e) {}
}

function sfxNewTab() {
  // Ascending chime C→E
  playTone(523, 'sine', 0.12, 0.18, true);
  setTimeout(() => playTone(659, 'sine', 0.15, 0.15, true), 80);
}
function sfxCloseTab() {
  // Descending soft tone
  playTone(440, 'sine', 0.08, 0.14, true);
  setTimeout(() => playTone(330, 'sine', 0.12, 0.1, true), 60);
}
function sfxSearch() {
  // Soft whoosh click
  playTone(800, 'sine', 0.06, 0.12, true);
  setTimeout(() => playTone(1200, 'sine', 0.08, 0.08, true), 40);
}
function sfxBookmark() {
  // Pop
  playTone(880, 'sine', 0.08, 0.15, true);
  setTimeout(() => playTone(1100, 'sine', 0.1, 0.1, true), 50);
}
function resumeAC() {
  if (AC.state === 'suspended') AC.resume();
}
document.addEventListener('click', resumeAC, { once: true });
document.addEventListener('keydown', resumeAC, { once: true });

/* ═══════════════════════════════════════
   GLOBALS
═══════════════════════════════════════ */
let tabs = [], activeTabId = null, tabCounter = 0;
let searchHistory = JSON.parse(localStorage.getItem('lith_hist') || '[]');
// [{url, title, ts}]
let currentTheme = localStorage.getItem('lith_theme') || 'default';
document.documentElement.setAttribute('data-theme', currentTheme === 'default' ? '' : currentTheme);

const BLOCKED = new Set([
  'google.com','www.google.com','youtube.com','www.youtube.com',
  'github.com','www.github.com','twitter.com','x.com','www.x.com',
  'facebook.com','www.facebook.com','instagram.com','www.instagram.com',
  'reddit.com','www.reddit.com','openai.com','www.openai.com',
  'claude.ai','www.claude.ai','linkedin.com','www.linkedin.com',
  'twitch.tv','netflix.com','amazon.com','www.amazon.com',
  'news.ycombinator.com','stackoverflow.com','www.stackoverflow.com',
  'notion.so','figma.com','mail.google.com','drive.google.com',
]);

/* ═══════════════════════════════════════
   DOM REFS
═══════════════════════════════════════ */
const tabBar       = document.getElementById('tab-bar');
const newTabBtn    = document.getElementById('new-tab-btn');
const urlBar       = document.getElementById('url-bar');
const urlDropdown  = document.getElementById('url-dropdown');
const secureIcon   = document.getElementById('secure-icon');
const viewport     = document.getElementById('viewport');
const progressBar  = document.getElementById('progress-bar');
const statusText   = document.getElementById('status-text');
const loadOverlay  = document.getElementById('loading-overlay');
const refreshBtn   = document.getElementById('refresh-btn-inline');
const btnBack      = document.getElementById('btn-back');
const btnFwd       = document.getElementById('btn-fwd');
const ctxMenu      = document.getElementById('ctx-menu');
const btnBm        = document.getElementById('btn-bm');
const btnMenu      = document.getElementById('btn-menu');
const btnHome      = document.getElementById('btn-home');
const bookmarksBar = document.getElementById('bookmarks-bar');
const modalOverlay = document.getElementById('modal-overlay');
const modalBox     = document.getElementById('modal-box');

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function normalizeUrl(v) {
  v = v.trim(); if (!v) return null;
  if (!v.includes('.') || v.includes(' ')) return 'https://www.google.com/search?q=' + encodeURIComponent(v);
  if (!/^https?:\/\//i.test(v)) return 'https://' + v;
  return v;
}
function getDomain(url) { try { return new URL(url).hostname; } catch { return url; } }
function isSecure(url)  { return /^https:\/\//i.test(url); }
function shortTitle(url){ try { return new URL(url).hostname.replace(/^www\./,''); } catch { return url.slice(0,24); } }
function isBlocked(url) { try { return BLOCKED.has(new URL(url).hostname); } catch { return false; } }
function fmtTime(ts) {
  const d = new Date(ts), now = new Date();
  if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const y = new Date(now - 86400000);
  if (d.toDateString() === y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}
function fmtDay(ts) {
  const d = new Date(ts), now = new Date();
  if (d.toDateString() === now.toDateString()) return 'Today';
  const y = new Date(now - 86400000);
  if (d.toDateString() === y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([],{weekday:'long', month:'long', day:'numeric'});
}

/* ═══════════════════════════════════════
   SEARCH HISTORY
═══════════════════════════════════════ */
function saveHistory(url, title) {
  if (!url || url === 'newtab') return;
  // Remove duplicate
  searchHistory = searchHistory.filter(h => h.url !== url);
  searchHistory.unshift({ url, title: title || shortTitle(url), ts: Date.now() });
  if (searchHistory.length > 500) searchHistory = searchHistory.slice(0, 500);
  try { localStorage.setItem('lith_hist', JSON.stringify(searchHistory)); } catch {}
}
function deleteHistoryItem(url) {
  searchHistory = searchHistory.filter(h => h.url !== url);
  try { localStorage.setItem('lith_hist', JSON.stringify(searchHistory)); } catch {}
}
function clearHistory() {
  searchHistory = [];
  try { localStorage.removeItem('lith_hist'); } catch {}
}

/* ── URL dropdown suggestions ── */
let suggSel = -1;
function showSuggestions(query) {
  urlDropdown.innerHTML = '';
  if (!query || query.length < 1) { urlDropdown.classList.remove('open'); return; }
  const q = query.toLowerCase();
  const matches = searchHistory.filter(h =>
    h.url.toLowerCase().includes(q) || (h.title||'').toLowerCase().includes(q)
  ).slice(0, 8);
  if (!matches.length) { urlDropdown.classList.remove('open'); return; }
  matches.forEach((h, i) => {
    const el = document.createElement('div');
    el.className = 'url-suggestion';
    el.dataset.url = h.url;
    el.innerHTML = `<span class="sug-icon">🕘</span>${h.title || shortTitle(h.url)}<span class="sug-domain">${getDomain(h.url)}</span>`;
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      urlBar.value = h.url;
      urlDropdown.classList.remove('open');
      navigateActive(h.url);
    });
    urlDropdown.appendChild(el);
  });
  suggSel = -1;
  urlDropdown.classList.add('open');
}

urlBar.addEventListener('input', () => showSuggestions(urlBar.value));
urlBar.addEventListener('focus', () => { urlBar.select(); showSuggestions(urlBar.value); });
urlBar.addEventListener('blur', () => setTimeout(() => urlDropdown.classList.remove('open'), 150));
urlBar.addEventListener('keydown', e => {
  const items = urlDropdown.querySelectorAll('.url-suggestion');
  if (e.key === 'ArrowDown') { e.preventDefault(); suggSel = Math.min(suggSel+1, items.length-1); items.forEach((el,i) => el.classList.toggle('sel', i===suggSel)); if(items[suggSel]) urlBar.value = items[suggSel].dataset.url; return; }
  if (e.key === 'ArrowUp')   { e.preventDefault(); suggSel = Math.max(suggSel-1, -1); items.forEach((el,i) => el.classList.toggle('sel', i===suggSel)); if(suggSel>=0 && items[suggSel]) urlBar.value = items[suggSel].dataset.url; return; }
  if (e.key === 'Escape')    { urlDropdown.classList.remove('open'); urlBar.blur(); return; }
  if (e.key === 'Enter') {
    urlDropdown.classList.remove('open');
    const u = normalizeUrl(urlBar.value);
    if (u) {
      sfxSearch();
      urlBar.classList.remove('searching'); void urlBar.offsetWidth;
      urlBar.classList.add('searching'); setTimeout(()=>urlBar.classList.remove('searching'),420);
      navigateActive(u); urlBar.blur();
    }
  }
});

/* ═══════════════════════════════════════
   PROGRESS
═══════════════════════════════════════ */
let progressTimer = null;
function startProgress() {
  clearInterval(progressTimer); let w = 0;
  progressBar.style.transition='none'; progressBar.style.width='0%';
  progressTimer = setInterval(() => {
    w += 10 + Math.random()*8; if(w>=88){clearInterval(progressTimer);w=88;}
    progressBar.style.transition='width .2s ease'; progressBar.style.width=w+'%';
  }, 250);
}
function finishProgress() {
  clearInterval(progressTimer);
  progressBar.style.transition='width .15s ease'; progressBar.style.width='100%';
  setTimeout(()=>{progressBar.style.transition='none';progressBar.style.width='0%';},300);
}

/* ═══════════════════════════════════════
   NTP
═══════════════════════════════════════ */
function buildNTP() {
  const ntp = document.createElement('div');
  ntp.className = 'new-tab-page';
  ntp.innerHTML = `<div class="ntp-card"><div class="ntp-title">Li<span>thium</span></div>
    <div class="ntp-search-wrap"><input type="text" placeholder="Search or enter address…" class="ntp-input">
    <button class="ntp-go">Go</button></div></div>`;
  const input = ntp.querySelector('.ntp-input');
  const btn   = ntp.querySelector('.ntp-go');
  const go = () => {
    const v = input.value.trim(); if(!v) return;
    sfxSearch();
    const sw = ntp.querySelector('.ntp-search-wrap');
    sw.style.transition='box-shadow .15s'; sw.style.boxShadow='inset 0 1px 3px rgba(0,50,150,.12),0 0 0 4px rgba(74,144,217,.28)';
    setTimeout(()=>sw.style.boxShadow='',350);
    navigateActive(normalizeUrl(v));
  };
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
  btn.addEventListener('click', go);
  return ntp;
}

/* ═══════════════════════════════════════
   BLOCKED PAGE
═══════════════════════════════════════ */
function buildBlockedPage(url) {
  const domain = getDomain(url);
  const el = document.createElement('div');
  el.className = 'blocked-page';
  el.innerHTML = `<div class="blocked-card"><div class="blocked-icon">🔗</div>
    <h2>Can't display this page</h2>
    <p><strong>${domain}</strong> uses security headers that prevent embedding inside other pages.</p>
    <div class="blocked-url">${url.length>72?url.slice(0,72)+'…':url}</div>
    <div class="blocked-actions">
      <button class="glass-btn" id="ext-open">Open in new tab ↗</button>
      <button class="glass-btn secondary" id="ext-back">← Back</button>
    </div></div>`;
  el.querySelector('#ext-open').addEventListener('click', ()=>window.open(url,'_blank'));
  el.querySelector('#ext-back').addEventListener('click', ()=>{
    const tab=getActiveTab(); if(tab&&tab.histIdx>0){tab.histIdx--;goToHistoryEntry(tab);}else btnHome.click();
  });
  return el;
}

function makeFrame() {
  const f = document.createElement('iframe');
  f.className = 'browser-frame';
  f.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation');
  return f;
}

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
function createTab(url=null) {
  sfxNewTab();
  const id = ++tabCounter;
  const tab = { id, url:url||'newtab', title:url?shortTitle(url):'New Tab',
    history:url?[url]:[], histIdx:url?0:-1,
    element:null, frame:null, ntpEl:null, blockedEl:null };
  tabs.push(tab);

  const el = document.createElement('div');
  el.className='tab'; el.dataset.id=id;
  el.innerHTML=`<span class="tab-favicon">${url?'🌐':'⊞'}</span><span class="tab-title">${tab.title}</span><button class="tab-close" title="Close (Ctrl+W)">×</button>`;
  el.addEventListener('click', e=>{ if(!e.target.classList.contains('tab-close')) switchTab(id); });
  el.querySelector('.tab-close').addEventListener('click', e=>{ e.stopPropagation(); closeTab(id); });
  tabBar.insertBefore(el, newTabBtn);
  tab.element = el;

  if (url) {
    tab.frame = makeFrame();
    viewport.appendChild(tab.frame);
    tab.frame.addEventListener('load', ()=>onFrameLoad(id, tab.frame));
    tab.frame.src = url;
  } else {
    tab.ntpEl = buildNTP();
    viewport.appendChild(tab.ntpEl);
  }
  switchTab(id);
  return tab;
}

function closeTab(id) {
  sfxCloseTab();
  const idx = tabs.findIndex(t=>t.id===id); if(idx<0) return;
  const tab = tabs[idx];
  if(tab._t) clearTimeout(tab._t);
  if(activeTabId===id && tabs.length>1) {
    const nxt = tabs[idx+1] || tabs[idx-1];
    if(nxt) switchTab(nxt.id);
  }
  if(tab.element) {
    tab.element.classList.add('closing');
    setTimeout(()=>{
      tab.element?.remove(); tab.frame?.remove(); tab.ntpEl?.remove(); tab.blockedEl?.remove();
      const i = tabs.findIndex(t=>t.id===id);
      if(i>=0) tabs.splice(i,1);
      if(!tabs.length) createTab();
    }, 160);
  } else {
    tab.frame?.remove(); tab.ntpEl?.remove(); tab.blockedEl?.remove();
    tabs.splice(idx,1);
    if(!tabs.length) createTab();
  }
}

function hideAll() {
  viewport.querySelectorAll('.browser-frame,.new-tab-page,.blocked-page').forEach(el=>el.classList.remove('active'));
  tabs.forEach(t=>t.element?.classList.remove('active'));
}

function switchTab(id) {
  activeTabId = id; hideAll();
  const tab = getTab(id); if(!tab) return;
  tab.element?.classList.add('active');
  (tab.blockedEl||tab.ntpEl||tab.frame)?.classList.add('active');
  urlBar.value = tab.url==='newtab'?'':tab.url;
  secureIcon.textContent = tab.url==='newtab'?'⊞':(isSecure(tab.url)?'🔒':'⚠');
  updateNavBtns();
  statusText.textContent = tab.url==='newtab'?'New Tab':getDomain(tab.url);
  const isBm = tab.url!=='newtab' && [...bookmarksBar.querySelectorAll('.bookmark-item')].some(b=>b.dataset.url===tab.url);
  btnBm.textContent = isBm?'★':'☆';
}

function getTab(id)    { return tabs.find(t=>t.id===id); }
function getActiveTab(){ return getTab(activeTabId); }

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
function navigateActive(url) {
  const tab = getActiveTab(); if(!tab||!url) return;
  if(tab.blockedEl){tab.blockedEl.remove();tab.blockedEl=null;}
  if(tab.ntpEl){tab.ntpEl.remove();tab.ntpEl=null;}
  if(tab._t){clearTimeout(tab._t);tab._t=null;}

  tab.url=url;
  tab.history=tab.history.slice(0,tab.histIdx+1);
  tab.history.push(url); tab.histIdx=tab.history.length-1;
  urlBar.value=url;
  secureIcon.textContent=isSecure(url)?'🔒':'⚠';
  updateTabTitle(tab.id, shortTitle(url));
  updateNavBtns();

  if(isBlocked(url)){showBlocked(tab,url);saveHistory(url,shortTitle(url));return;}

  if(!tab.frame){
    tab.frame=makeFrame();
    viewport.appendChild(tab.frame);
    tab.frame.addEventListener('load',()=>onFrameLoad(tab.id,tab.frame));
  }
  hideAll(); tab.element?.classList.add('active'); tab.frame.classList.add('active');
  tab.frame.src=url;
  statusText.textContent='Connecting to '+getDomain(url)+'…';
  showLoading(true); startProgress(); refreshBtn.classList.add('loading');

  tab._t=setTimeout(()=>{
    try{ const doc=tab.frame?.contentDocument; if(doc&&(!doc.body||!doc.body.innerHTML.trim())) showBlocked(tab,url); }catch{}
    finishProgress(); showLoading(false); refreshBtn.classList.remove('loading');
  },8000);
}

function showBlocked(tab, url) {
  if(tab.frame) tab.frame.classList.remove('active');
  if(tab.blockedEl) tab.blockedEl.remove();
  tab.blockedEl=buildBlockedPage(url); viewport.appendChild(tab.blockedEl); tab.blockedEl.classList.add('active');
  finishProgress(); showLoading(false); refreshBtn.classList.remove('loading');
  statusText.textContent=getDomain(url)+' — opens externally';
}

function goToHistoryEntry(tab) {
  const url=tab.history[tab.histIdx];
  tab.url=url; urlBar.value=url;
  secureIcon.textContent=isSecure(url)?'🔒':'⚠';
  updateTabTitle(tab.id, shortTitle(url));
  if(tab.blockedEl){tab.blockedEl.remove();tab.blockedEl=null;}
  if(tab.ntpEl){tab.ntpEl.remove();tab.ntpEl=null;}
  if(isBlocked(url)){showBlocked(tab,url);updateNavBtns();return;}
  if(!tab.frame){tab.frame=makeFrame();viewport.appendChild(tab.frame);tab.frame.addEventListener('load',()=>onFrameLoad(tab.id,tab.frame));}
  hideAll(); tab.element?.classList.add('active'); tab.frame.classList.add('active');
  tab.frame.src=url; startProgress(); showLoading(true); refreshBtn.classList.add('loading');
  statusText.textContent='Loading…'; updateNavBtns();
}

function onFrameLoad(id, frame) {
  finishProgress(); showLoading(false); refreshBtn.classList.remove('loading');
  const tab=getTab(id); if(!tab) return;
  if(tab._t){clearTimeout(tab._t);tab._t=null;}
  try{
    const doc=frame.contentDocument;
    if(doc&&doc.body!==null&&!doc.body.innerHTML.trim()&&tab.url&&tab.url!=='about:blank'){showBlocked(tab,tab.url);return;}
  }catch{}
  let title=shortTitle(tab.url);
  try{const t=frame.contentDocument?.title;if(t)title=t;}catch{}
  updateTabTitle(id,title);
  statusText.textContent=getDomain(tab.url);
  saveHistory(tab.url, title);
}

function showLoading(v){loadOverlay.classList.toggle('show',v);}
function updateTabTitle(id,title){
  const tab=getTab(id);if(!tab?.element)return;
  tab.title=title;
  tab.element.querySelector('.tab-title').textContent=title;
  tab.element.querySelector('.tab-favicon').textContent=tab.url==='newtab'?'⊞':'🌐';
}
function updateNavBtns(){
  const tab=getActiveTab();
  btnBack.disabled=!tab||tab.histIdx<=0;
  btnFwd.disabled=!tab||tab.histIdx>=tab.history.length-1;
}

/* ═══════════════════════════════════════
   BOOKMARKS
═══════════════════════════════════════ */
function addBookmark(url, title) {
  if([...bookmarksBar.querySelectorAll('.bookmark-item')].some(b=>b.dataset.url===url)) return false;
  const bk=document.createElement('div');
  bk.className='bookmark-item'; bk.dataset.url=url;
  const icon=document.createElement('span'); icon.textContent='⭐'; icon.style.fontSize='10px';
  const label=document.createElement('span'); label.textContent=title||shortTitle(url);
  const rm=document.createElement('span'); rm.className='bm-remove'; rm.textContent='×'; rm.title='Remove';
  bk.append(icon,label,rm);
  bk.addEventListener('click',e=>{
    if(e.target===rm){
      bk.style.transition='all .14s ease'; bk.style.opacity='0'; bk.style.maxWidth='0'; bk.style.padding='0';
      setTimeout(()=>bk.remove(),150);
      if(getActiveTab()?.url===url){btnBm.textContent='☆';}
    } else { navigateActive(url); }
  });
  bookmarksBar.appendChild(bk);
  sfxBookmark();
  return true;
}

/* ═══════════════════════════════════════
   MODALS
═══════════════════════════════════════ */
function openModal(content) {
  modalBox.innerHTML=''; modalBox.style.display='flex'; modalBox.appendChild(content);
  modalOverlay.classList.add('open');
}
function closeModal() {
  modalOverlay.classList.remove('open');
  setTimeout(()=>{modalBox.style.display='none';modalBox.innerHTML='';},100);
}
modalOverlay.addEventListener('click',e=>{ if(e.target===modalOverlay) closeModal(); });

/* ── History Modal ── */
function openHistoryModal() {
  const wrap = document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;width:100%';
  wrap.innerHTML=`<div class="modal-header"><span class="modal-title">🕘 History</span><button class="modal-close">×</button></div>`;
  wrap.querySelector('.modal-close').addEventListener('click',closeModal);

  const body = document.createElement('div');
  body.className='modal-body';

  const searchBox = document.createElement('input');
  searchBox.className='hist-search'; searchBox.placeholder='Search history…'; searchBox.type='text';

  const list = document.createElement('div');

  function renderList(filter='') {
    list.innerHTML='';
    const items = filter
      ? searchHistory.filter(h=>(h.url+h.title).toLowerCase().includes(filter.toLowerCase()))
      : searchHistory;
    if(!items.length){list.innerHTML='<div class="hist-empty">No history yet</div>';return;}
    let lastDay='';
    items.forEach(h=>{
      const day=fmtDay(h.ts);
      if(day!==lastDay){const d=document.createElement('div');d.className='hist-day';d.textContent=day;list.appendChild(d);lastDay=day;}
      const row=document.createElement('div'); row.className='hist-item';
      row.innerHTML=`<span class="hi-icon">🌐</span><div class="hi-text"><div class="hi-title">${h.title||shortTitle(h.url)}</div><div class="hi-url">${h.url}</div></div><span class="hi-time">${fmtTime(h.ts)}</span><button class="hi-del" title="Remove">×</button>`;
      row.querySelector('.hi-del').addEventListener('click',e=>{e.stopPropagation();deleteHistoryItem(h.url);renderList(searchBox.value);});
      row.addEventListener('click',()=>{navigateActive(h.url);closeModal();});
      list.appendChild(row);
    });
    // Clear all button
    if(!filter&&searchHistory.length){
      const clr=document.createElement('button');clr.className='hist-clear';clr.textContent='Clear all history';
      clr.addEventListener('click',()=>{clearHistory();renderList();});
      list.appendChild(clr);
    }
  }

  searchBox.addEventListener('input',()=>renderList(searchBox.value));
  renderList();
  body.append(searchBox, list);
  wrap.appendChild(body);
  openModal(wrap);
  setTimeout(()=>searchBox.focus(),80);
}

/* ── Themes Modal ── */
const THEMES = [
  {id:'default', name:'Windows Blue', colors:['#c8ddf0','#a8c8e8','#4a90d9']},
  {id:'dark',    name:'Dark Aero',    colors:['#1a1a2e','#16213e','#5ba3f0']},
  {id:'green',   name:'Forest Green', colors:['#c8e8d0','#a0c8b0','#3a9a5a']},
  {id:'sunset',  name:'Warm Sunset',  colors:['#f5d0a8','#e8a870','#c0612a']},
];
function openThemesModal() {
  const wrap=document.createElement('div'); wrap.style.cssText='display:flex;flex-direction:column;width:100%';
  wrap.innerHTML=`<div class="modal-header"><span class="modal-title">🎨 Themes</span><button class="modal-close">×</button></div>`;
  wrap.querySelector('.modal-close').addEventListener('click',closeModal);
  const body=document.createElement('div'); body.className='modal-body';
  const grid=document.createElement('div'); grid.className='theme-grid';
  THEMES.forEach(t=>{
    const sw=document.createElement('div'); sw.className='theme-swatch'+(currentTheme===t.id?' active':'');
    const prev=document.createElement('div'); prev.className='swatch-preview';
    prev.style.background=`linear-gradient(135deg,${t.colors[0]},${t.colors[1]},${t.colors[2]})`;
    const lbl=document.createElement('div'); lbl.className='swatch-label'; lbl.textContent=t.name;
    sw.append(prev,lbl);
    sw.addEventListener('click',()=>{
      currentTheme=t.id;
      document.documentElement.setAttribute('data-theme',t.id==='default'?'':t.id);
      try{localStorage.setItem('lith_theme',t.id);}catch{}
      grid.querySelectorAll('.theme-swatch').forEach((s,i)=>s.classList.toggle('active',THEMES[i].id===t.id));
    });
    grid.appendChild(sw);
  });
  body.appendChild(grid); wrap.appendChild(body); openModal(wrap);
}

/* ═══════════════════════════════════════
   EVENT WIRING
═══════════════════════════════════════ */
refreshBtn.addEventListener('click',()=>{
  const tab=getActiveTab(); if(!tab||tab.url==='newtab') return;
  if(tab.blockedEl){tab.blockedEl.remove();tab.blockedEl=null;}
  if(!tab.frame){tab.frame=makeFrame();viewport.appendChild(tab.frame);tab.frame.addEventListener('load',()=>onFrameLoad(tab.id,tab.frame));}
  hideAll(); tab.element?.classList.add('active'); tab.frame.classList.add('active');
  startProgress(); showLoading(true); refreshBtn.classList.add('loading');
  tab.frame.src=tab.url; statusText.textContent='Refreshing…';
});

btnBack.addEventListener('click',()=>{const tab=getActiveTab();if(!tab||tab.histIdx<=0)return;tab.histIdx--;goToHistoryEntry(tab);});
btnFwd.addEventListener('click',()=>{const tab=getActiveTab();if(!tab||tab.histIdx>=tab.history.length-1)return;tab.histIdx++;goToHistoryEntry(tab);});

btnHome.addEventListener('click',()=>{
  const tab=getActiveTab(); if(!tab) return;
  tab.frame?.classList.remove('active');
  if(tab.blockedEl){tab.blockedEl.remove();tab.blockedEl=null;}
  if(!tab.ntpEl){tab.ntpEl=buildNTP();viewport.appendChild(tab.ntpEl);}
  hideAll(); tab.element?.classList.add('active'); tab.ntpEl.classList.add('active');
  tab.url='newtab'; urlBar.value=''; secureIcon.textContent='⊞';
  statusText.textContent='New Tab'; updateTabTitle(tab.id,'New Tab'); updateNavBtns();
  btnBm.textContent='☆';
});

newTabBtn.addEventListener('click',()=>createTab());

btnBm.addEventListener('click',()=>{
  const tab=getActiveTab(); if(!tab||tab.url==='newtab') return;
  const already=[...bookmarksBar.querySelectorAll('.bookmark-item')].find(b=>b.dataset.url===tab.url);
  if(already){
    already.style.transition='all .14s ease'; already.style.opacity='0'; already.style.maxWidth='0'; already.style.padding='0';
    setTimeout(()=>already.remove(),150);
    btnBm.textContent='☆';
  } else {
    addBookmark(tab.url, tab.title);
    btnBm.textContent='★'; setTimeout(()=>btnBm.textContent='☆',900);
  }
});

btnMenu.addEventListener('click',e=>{
  const r=btnMenu.getBoundingClientRect();
  ctxMenu.style.top=r.bottom+2+'px';
  ctxMenu.style.right=(window.innerWidth-r.right)+'px';
  ctxMenu.style.left='auto';
  ctxMenu.classList.add('show'); e.stopPropagation();
});
document.addEventListener('click',()=>ctxMenu.classList.remove('show'));

document.getElementById('ctx-new-tab').addEventListener('click',()=>createTab());
document.getElementById('ctx-history').addEventListener('click',()=>openHistoryModal());
document.getElementById('ctx-themes').addEventListener('click',()=>openThemesModal());
document.getElementById('ctx-about').addEventListener('click',()=>openAboutModal());
document.getElementById('ctx-zoom-in').addEventListener('click',()=>{const t=getActiveTab();if(t?.frame)t.frame.style.zoom=Math.min(parseFloat(t.frame.style.zoom||1)+0.1,3);});
document.getElementById('ctx-zoom-out').addEventListener('click',()=>{const t=getActiveTab();if(t?.frame)t.frame.style.zoom=Math.max(parseFloat(t.frame.style.zoom||1)-0.1,0.3);});

document.addEventListener('keydown',e=>{
  if(e.key==='F5'){e.preventDefault();refreshBtn.click();}
  if(e.altKey&&e.key==='ArrowLeft'){e.preventDefault();btnBack.click();}
  if(e.altKey&&e.key==='ArrowRight'){e.preventDefault();btnFwd.click();}
  if((e.ctrlKey||e.metaKey)&&e.key==='t'){e.preventDefault();createTab();}
  if((e.ctrlKey||e.metaKey)&&e.key==='w'){e.preventDefault();closeTab(activeTabId);}
  if((e.ctrlKey||e.metaKey)&&e.key==='l'){e.preventDefault();urlBar.focus();}
  if((e.ctrlKey||e.metaKey)&&e.key==='h'){e.preventDefault();openHistoryModal();}
  if((e.ctrlKey||e.metaKey)&&e.key==='d'){e.preventDefault();btnBm.click();}
  if(e.key==='Escape'&&modalOverlay.classList.contains('open')){closeModal();}
});

/* ── INIT ── */
createTab();
updateNavBtns();
</script>
